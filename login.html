<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Banana King Chips</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body class="login-page">
    <div class="login-container">
        <a href="index.html" class="logo">Banana <span>King</span></a>
        <h2>Login Admin</h2>
        <p>Silakan masukkan kredensial Anda untuk mengakses fitur admin.</p>
        <div id="error-message" style="color: #e03131; background: #ffe3e3; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px;"></div>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <div class="form-group">
                <button type="submit" class="btn">Login</button>
            </div>
        </form>
    </div>

    <script>
        // Cek jika sudah login
        if (localStorage.getItem('isAdmin') === 'true') {
            window.location.href = 'menu.html?admin=true';
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            // Login sederhana untuk versi static/frontend-only
            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('isAdmin', 'true');
                window.location.href = 'menu.html?admin=true';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Username atau password salah!';
            }
        });
    </script>
</body>
</html>
