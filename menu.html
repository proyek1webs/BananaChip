<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Menu Banana King Chips - Pesan keripik pisang favoritmu">
    <meta name="google-site-verification" content="dDAxuJTjVgIFBW1I6EarDfV_SofHhDvvz6IU0M1girw" />
    <title>Menu - Banana King Chips</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="login.html" class="logo">Banana <span>King</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="#" id="logout-link" style="display:none;">Logout</a></li>
            </ul>
        </nav>
    </header>

    <section id="menu" class="menu-page">
        <h2>Menu Banana King Chips</h2>

        <div class="admin-controls" style="display:none;">
            <div class="add-item-form" id="add-form">
                <h3>Tambah Item Menu Baru</h3>
                <input type="text" id="add-nama-item" placeholder="Nama Item" required>
                <textarea id="add-deskripsi" placeholder="Deskripsi"></textarea>
                <input type="number" id="add-harga" placeholder="Harga" min="0" required>
                <input type="text" id="add-gambar-text" placeholder="Nama File Gambar (contoh: coklat.png)" required>
                <button id="btn-add-item">Tambah Menu</button>
            </div>

            <div class="add-item-form" id="edit-form" style="display:none;">
                <h3>Edit Item Menu</h3>
                <input type="hidden" id="edit-id-item">
                <input type="text" id="edit-nama-item" placeholder="Nama Item" required>
                <textarea id="edit-deskripsi" placeholder="Deskripsi"></textarea>
                <input type="number" id="edit-harga" placeholder="Harga" min="0" required>
                <input type="text" id="edit-gambar-text" placeholder="Nama File Gambar (contoh: coklat.png)" required>
                <div id="current-image-preview"></div>
                <button id="btn-update-item">Perbarui Menu</button>
                <button id="btn-cancel-edit">Batal</button>
            </div>
            
            <hr style="margin: 40px auto; width: 80%; opacity: 0.2;">
        </div>

        <div class="menu-items">
            <!-- Menu items akan dimuat di sini oleh JS -->
        </div>

        <div class="note-area">
            <input type="text" id="nama-pembeli" placeholder="Nama Pembeli" required style="width:100%; padding:15px; border:2px solid #eee; border-radius:12px; font-family:inherit; font-size:15px; margin-bottom:15px; transition:0.3s;">
            <textarea id="note" placeholder="Catatan tambahan (opsional)..."></textarea>
            <button id="pesan-sekarang">Pesan Sekarang via WhatsApp</button>
        </div>
    </section>

    <!-- Supabase JS & Main Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

</body>
</html>
